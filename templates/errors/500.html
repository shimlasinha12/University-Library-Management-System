<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 Server Error | LibraryMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/favicon-32x32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='images/favicon-16x16.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/apple-touch-icon.png') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--gray-100); }
    .error-box { text-align:center; max-width:440px; padding:24px; }
    .error-code { font-size:7rem; font-weight:800; color:var(--danger-100); line-height:1; }
    .error-title { font-size:1.5rem; font-weight:700; color:var(--gray-800); margin:8px 0; }
    .error-text { color:var(--gray-500); margin-bottom:28px; font-size:.9rem; }
  </style>
</head>
<body>
  <div class="error-box">
    <div class="error-code">500</div>
    <div class="error-title">Internal Server Error</div>
    <p class="error-text">Something went wrong on our end. Please try again later.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary"><i class="fas fa-home"></i> Back to Home</a>
  </div>
</body>
</html>
