{% extends "admin/base_admin.html" %}

{% block title %}{{ action }} Author{% endblock %}
{% block topbar_title %}{{ action }} Author{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left"><h1>{{ action }} Author</h1></div>
  <a href="{{ url_for('admin.authors') }}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<div style="max-width:520px">
  <div class="card">
    <div class="card-body">
      <form method="POST" action="{{ url_for('admin.add_author') if action == 'Add' else url_for('admin.edit_author', author_id=author.id) }}">
        <div class="form-group">
          <label class="form-label" for="name">Name <span style="color:var(--danger-600)">*</span></label>
          <input id="name" type="text" name="name" class="form-control" value="{{ form.name or '' }}" required placeholder="Author full name">
        </div>
        <div class="form-group">
          <label class="form-label" for="description">Description</label>
          <textarea id="description" name="description" class="form-control" rows="3" placeholder="Optional bio or notes">{{ form.description or '' }}</textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary"><i class="fas fa-{{ 'plus' if action == 'Add' else 'save' }}"></i> {{ action }} Author</button>
          <a href="{{ url_for('admin.authors') }}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
