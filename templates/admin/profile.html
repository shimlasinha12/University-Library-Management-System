{% extends "admin/base_admin.html" %}

{% block title %}My Profile{% endblock %}
{% block topbar_title %}My Profile{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left"><h1>My Profile</h1><p>Update your account information and password.</p></div>
</div>

<div style="max-width:560px">
  <div class="card">
    <div class="card-body">
      <form method="POST" action="{{ url_for('admin.profile') }}">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" value="{{ user.username }}" disabled style="background:var(--gray-50);color:var(--gray-500)">
          <div class="form-hint">Username cannot be changed.</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="full_name">Full Name <span style="color:var(--danger-600)">*</span></label>
          <input id="full_name" type="text" name="full_name" class="form-control" value="{{ user.full_name }}" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email <span style="color:var(--danger-600)">*</span></label>
          <input id="email" type="email" name="email" class="form-control" value="{{ user.email }}" required>
        </div>
        <div class="divider"></div>
        <p style="font-size:0.78rem;font-weight:600;text-transform:uppercase;color:var(--gray-500);letter-spacing:.06em;margin-bottom:14px">Change Password (optional)</p>
        <div class="form-group">
          <label class="form-label" for="new_password">New Password</label>
          <input id="new_password" type="password" name="new_password" class="form-control" placeholder="Leave blank to keep current">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm New Password</label>
          <input id="confirm_password" type="password" name="confirm_password" class="form-control" placeholder="Repeat new password">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
